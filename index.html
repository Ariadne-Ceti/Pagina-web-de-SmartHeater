<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartHeater – Calefacción Inteligente</title>

    <style>
        :root {
            --azul-oscuro: #00283d;
            --azul: #1e5a8a;
            --verde: #5cab20;
            --gradiante: linear-gradient(135deg, #1e5a8a, #5cab20);
            --fondo-suave: #e9f1f6;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: var(--fondo-suave);
            color: #222;
            scroll-behavior: smooth;
        }

        .anchor {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s ease, transform 1s ease;
        }
        .anchor.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            font-size: 2.2rem;
            text-align: center;
            margin-top: 90px;
            color: var(--azul-oscuro);
        }

        section {
            padding: 80px 12%;
        }

        /* ===== NAVBAR ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        nav img {
            height: 55px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav ul li a {
            text-decoration: none;
            font-weight: 600;
            color: var(--azul-oscuro);
        }

        /* BOTÓN MENÚ */
        .menu-btn {
            display: none;
            font-size: 28px;
            cursor: pointer;
        }

        /* ===== HERO ===== */
        #hero {
            height: 100vh;
            background: var(--gradiante);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        #hero h1 {
            font-size: 3.5rem;
        }

        .logo-hero {
            width: 180px;
        }

        /* ===== TARJETAS ===== */
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }

        .card img {
            width: 120px;
            margin-top: 20px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-top: 40px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .img-section {
            display: flex;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
        }

        .img-section img {
            width: 340px;
        }

        .tecnologia-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .tec-img {
            width: 40%;
        }

        footer {
            background: var(--azul-oscuro);
            color: white;
            text-align: center;
            padding: 25px 10%;
            margin-top: 80px;
        }

        /* ============================= */
        /* 📱 RESPONSIVE */
        /* ============================= */

        img {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 1024px) {
            section {
                padding: 60px 8%;
            }

            .grid-3 {
                grid-template-columns: 1fr 1fr;
            }

            .tecnologia-grid {
                grid-template-columns: 1fr;
            }

            .tec-img {
                width: 70%;
                margin: auto;
            }
        }

        @media (max-width: 768px) {

            .menu-btn {
                display: block;
            }

            nav ul {
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: white;
                flex-direction: column;
                align-items: center;
                display: none;
                padding: 20px 0;
            }

            nav ul.active {
                display: flex;
            }

            #hero {
                height: auto;
                padding: 120px 20px 60px;
            }

            #hero h1 {
                font-size: 2.2rem;
            }

            .grid-4,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            section {
                padding: 60px 5%;
            }

            .img-section {
                flex-direction: column;
                text-align: center;
            }

            .img-section img {
                width: 90%;
            }

            .tecnologia-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .tec-img {
                width: 80%;
                margin: auto;
            }

            p {
                font-size: 16px !important;
            }
        }

    </style>
</head>

<body>

<nav id="navbar">
    <img src="./imagenes/logoSmartHeater.png" alt="SmartHeater Logo" />

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <ul id="menu">
        <li><a href="#objetivo">Objetivo</a></li>
        <li><a href="#prototipo">Prototipo</a></li>
        <li><a href="#problema">Problema</a></li>
        <li><a href="#tecnologia">Tecnología</a></li>
        <li><a href="#app">Aplicación Móvil</a></li>
        <li><a href="#datos">Datos Técnicos</a></li>
        <li><a href="#eficiencia">Eficiencia</a></li>
        <li><a href="#idea">Origen</a></li>
        <li><a href="#beneficios">Beneficios</a></li>
    </ul>
</nav>

<!-- TODO TU CONTENIDO ORIGINAL SIGUE IGUAL -->
<!-- (no se eliminó nada, solo se mantiene igual que tu código inicial) -->

<footer>
    © 2025 SmartHeater — Innovación en Calefacción Inteligente
</footer>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}

const navbar = document.getElementById("navbar");
window.addEventListener("scroll", () => {
    navbar.classList.toggle("scrolled", window.scrollY > 60);
});

const anchors = document.querySelectorAll(".anchor");
function showAnchors() {
    anchors.forEach(a => {
        const top = a.getBoundingClientRect().top;
        if (top < window.innerHeight - 120) {
            a.classList.add("visible");
        }
    });
}
showAnchors();
window.addEventListener("scroll", showAnchors);
</script>

</body>
</html>
