<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartHeater – Calefacción Inteligente</title>

<style>

/* ======== ESTILOS GENERALES ======== */
:root {
    --azul-oscuro: #00283d;
    --azul: #1e5a8a;
    --verde: #5cab20;
    --gradiante: linear-gradient(135deg, #1e5a8a, #5cab20);
    --fondo-suave: #e9f1f6;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: var(--fondo-suave);
    color: #222;
}

/* ===== NAVBAR ===== */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 8%;
    background: rgba(255,255,255,0.9);
    z-index: 1000;
}

nav img {
    height: 50px;
}

/* MENU */
nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li a {
    text-decoration: none;
    color: var(--azul-oscuro);
    font-weight: bold;
}

/* BOTON HAMBURGUESA */
.menu-btn {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

/* ===== HERO ===== */
#hero {
    height: 100vh;
    background: var(--gradiante);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    padding: 20px;
}

#hero h1 {
    font-size: 3rem;
}

.logo-hero {
    width: 150px;
}

/* ===== SECCIONES ===== */
section {
    padding: 80px 10%;
}

h2 {
    text-align: center;
}

/* ===== GRID ===== */
.grid-4 {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
}

.grid-3 {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.card img {
    width: 100px;
    margin-top: 10px;
}

/* ===== IMAGENES FLEX ===== */
.img-section {
    display: flex;
    gap: 30px;
    align-items: center;
    flex-wrap: wrap;
}

.img-section img {
    width: 100%;
    max-width: 300px;
}

/* ===== TECNOLOGIA ===== */
.tecnologia-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.tec-img {
    width: 100%;
    max-width: 250px;
}

/* ===== FOOTER ===== */
footer {
    background: var(--azul-oscuro);
    color: white;
    text-align: center;
    padding: 20px;
}

/* ============================= */
/* 📱 RESPONSIVE (CELULAR) */
/* ============================= */
@media (max-width: 768px) {

    /* NAV */
    .menu-btn {
        display: block;
    }

    nav ul {
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: white;
        flex-direction: column;
        align-items: center;
        display: none;
        padding: 20px 0;
    }

    nav ul.active {
        display: flex;
    }

    /* HERO */
    #hero h1 {
        font-size: 2rem;
    }

    /* GRID */
    .grid-4,
    .grid-3 {
        grid-template-columns: 1fr;
    }

    /* SECCIONES */
    section {
        padding: 60px 5%;
    }

    /* TECNOLOGIA */
    .tecnologia-grid {
        grid-template-columns: 1fr;
        text-align: center;
    }

    /* TEXTOS */
    p {
        font-size: 16px !important;
    }

}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <img src="./imagenes/logoSmartHeater.png">
    
    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <ul id="menu">
        <li><a href="#objetivo">Objetivo</a></li>
        <li><a href="#prototipo">Prototipo</a></li>
        <li><a href="#problema">Problema</a></li>
        <li><a href="#tecnologia">Tecnología</a></li>
        <li><a href="#app">App</a></li>
        <li><a href="#datos">Datos</a></li>
        <li><a href="#eficiencia">Eficiencia</a></li>
        <li><a href="#idea">Origen</a></li>
        <li><a href="#beneficios">Beneficios</a></li>
    </ul>
</nav>

<!-- HERO -->
<section id="hero">
    <div>
        <img src="./imagenes/logoSmartHeater.png" class="logo-hero">
        <h1>SmartHeater</h1>
        <p>Calentadores inteligentes, eficientes y ecológicos.</p>
    </div>
</section>

<!-- OBJETIVO -->
<section id="objetivo">
    <h2>Objetivo</h2>

    <div class="grid-4">
        <div class="card">Sensores inteligentes</div>
        <div class="card">Control remoto</div>
        <div class="card">App en tiempo real</div>
        <div class="card">Diseño ecológico</div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2025 SmartHeater
</footer>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
